<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;

    /* State palette */
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);

    /* Active state (set by JS) */
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);

    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background radial glow ── */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 720px;
    padding: 16px 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 18px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .model-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg {
    width: 10px;
    height: 10px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  /* ── Main stack ── */
  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  /* ── Webcam viewport ── */
  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
  }

  .viewport-wrap .state-indicator {
    position: absolute;
    bottom: 12px;
    left: 12px;
    z-index: 3;
  }

  .viewport-wrap .frame-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 3;
    background: rgba(0, 0, 0, 0.55);
    color: #4ade80;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.3px;
    pointer-events: none;
    backdrop-filter: blur(4px);
  }

  /* Three glow layers */
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  /* Layer 1 — tight inner glow */
  .viewport-wrap::before {
    box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim);
    z-index: 3;
    animation: glow-breathe-1 3s ease-in-out infinite;
  }

  /* Layer 2 — mid spread */
  .viewport-wrap::after {
    box-shadow: 0 0 40px 8px var(--glow-dim);
    z-index: 2;
    animation: glow-breathe-2 4s ease-in-out infinite;
  }

  /* Layer 3 — outer diffuse */
  .viewport-glow {
    inset: -6px;
    border-radius: 22px;
    box-shadow: 0 0 80px 20px var(--glow-dim);
    z-index: 1;
    animation: glow-breathe-3 5s ease-in-out infinite;
  }

  /* State: listening — gentle breathe */
  @keyframes glow-breathe-1 {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes glow-breathe-2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes glow-breathe-3 {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* State: processing — faster, tighter */
  .viewport-wrap.processing::before { animation-duration: 0.8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: 0.3; }

  /* State: speaking — smooth pulse driven by JS amplitude */
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow {
    animation: none;
  }

  /* State: loading — very slow, dim */
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: 0.3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: 0.2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: 0.1; }

  video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    background: #0a0a10;
    transform: scaleX(-1);
    position: relative;
    z-index: 2;
  }

  /* ── Waveform canvas ── */
  .waveform-wrap {
    width: 100%;
    max-width: 480px;
    height: 52px;
    margin-top: 16px;
    flex-shrink: 0;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Transcript ── */
  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
    mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
  }

  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 85%;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(74,222,128,0.08);
    color: #b0d8c0;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10.5px;
    color: var(--c-text-dim);
    margin-top: 5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 1.55em;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.5);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── Controls (compact, in header) ── */
  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .ctrl-btn.compact {
    padding: 5px 8px;
    font-size: 10px;
  }

  .ctrl-btn.icon-btn {
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-btn.icon-btn svg {
    width: 14px;
    height: 14px;
  }

  .length-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .length-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--c-text-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-right: 2px;
  }

  /* ── State indicator (floating near viewport) ── */
  .state-indicator {
    position: absolute;
    bottom: 12px;
    left: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
    z-index: 3;
    background: rgba(5,5,9,0.7);
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
  }

  .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .composer {
    width: 100%;
    max-width: 640px;
    padding: 10px 4px 0;
    display: none;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  .composer.visible {
    display: flex;
  }

  .composer textarea {
    flex: 1;
    min-height: 44px;
    max-height: 120px;
    resize: vertical;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font: inherit;
    line-height: 1.45;
    outline: none;
  }

  .composer textarea::placeholder {
    color: var(--c-text-dim);
  }

  .composer textarea:focus {
    border-color: rgba(74,222,128,0.25);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.08);
  }

  /* Settings panel */
  .settings-panel {
    display: none;
    position: fixed;
    top: 52px;
    right: max(12px, calc((100vw - 720px) / 2 + 12px));
    width: 380px;
    max-width: calc(100vw - 24px);
    background: #0d0d14;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .settings-panel.visible { display: block; }

  .settings-panel label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--c-text-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .settings-panel textarea {
    width: 100%;
    min-height: 120px;
    max-height: 260px;
    resize: vertical;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-bright);
    font: inherit;
    font-size: 13px;
    line-height: 1.5;
    outline: none;
    box-sizing: border-box;
  }
  .settings-panel textarea::placeholder { color: var(--c-text-dim); }
  .settings-panel textarea:focus {
    border-color: rgba(74,222,128,0.25);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.08);
  }

  .settings-hint {
    font-size: 10px;
    color: var(--c-text-dim);
    margin-top: 6px;
    line-height: 1.4;
  }

  .settings-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: flex-end;
  }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">
      <div class="logo-mark"></div>
      <h1>Parlor</h1>
    </div>
    <span id="modelLabel" class="model-label">Loading model...</span>
  </div>
  <div class="header-right">
    <button id="cameraToggle" class="ctrl-btn" aria-label="Toggle camera">Enable Camera/Mic</button>
    <button id="speakerToggle" class="ctrl-btn active" aria-label="Toggle speaker">Speaker On</button>
    <div class="length-group">
      <span class="length-label">Reply</span>
      <button id="lengthShort" class="ctrl-btn compact">Short</button>
      <button id="lengthMedium" class="ctrl-btn compact active">Med</button>
      <button id="lengthLong" class="ctrl-btn compact">Long</button>
    </div>
    <button id="textToggle" class="ctrl-btn icon-btn" title="Toggle text input" aria-label="Toggle text input">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 4h10M3 8h7M3 12h9"/>
      </svg>
    </button>
    <button id="settingsToggle" class="ctrl-btn icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.1 3.1l.8.8M12.1 12.1l.8.8M12.9 3.1l-.8.8M3.9 12.1l-.8.8"/>
      </svg>
    </button>
    <div id="status" class="status-pill disconnected" role="status">Disconnected</div>
  </div>
</header>

<div id="settingsPanel" class="settings-panel">
  <label for="systemPromptInput">System Prompt</label>
  <textarea id="systemPromptInput" placeholder="Loading default..."></textarea>
  <div class="settings-hint">MLX backend requires TRANSCRIPTION / RESPONSE format in the prompt.</div>
  <div class="settings-actions">
    <button id="settingsReset" class="ctrl-btn compact">Reset</button>
    <button id="settingsSave" class="ctrl-btn compact active">Save</button>
  </div>
</div>

<div class="portal-stack">
  <!-- Webcam viewport with glow layers -->
  <div id="viewportWrap" class="viewport-wrap loading">
    <div class="viewport-glow"></div>
    <video id="video" autoplay muted playsinline></video>
    <div class="state-indicator">
      <div id="stateDot" class="dot loading"></div>
      <span id="stateText" aria-live="assertive">Loading...</span>
    </div>
    <div id="frameBadge" class="frame-badge" style="display:none">0 frames</div>
  </div>

  <!-- Audio waveform visualizer -->
  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <!-- Transcript -->
  <div id="messages" class="transcript" role="log" aria-live="polite"></div>

  <div id="composer" class="composer">
    <textarea id="textInput" placeholder="Type a message. If camera is on, recent frames will be sent too."></textarea>
    <button id="sendButton" class="ctrl-btn active">Send</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const video = $('video'), cameraToggle = $('cameraToggle');
const speakerToggle = $('speakerToggle');
const lengthShort = $('lengthShort');
const lengthMedium = $('lengthMedium');
const lengthLong = $('lengthLong');
const textInput = $('textInput');
const sendButton = $('sendButton');
const textToggle = $('textToggle');
const composer = $('composer');
const modelLabel = $('modelLabel');
const messagesDiv = $('messages'), statusEl = $('status');
const stateDot = $('stateDot'), stateText = $('stateText');
const viewportWrap = $('viewportWrap');
const waveformCanvas = $('waveform');
const waveformCtx = waveformCanvas.getContext('2d');

let ws, mediaStream, myvad;
let cameraEnabled = true;
let audioCtx, currentSource;
let state = 'loading';
let ignoreIncomingAudio = false;
let speakerEnabled = true;
let responseLength = 'medium';
let composerVisible = false;

// Streaming audio playback state
let streamSampleRate = 24000;
let streamNextTime = 0;         // When to schedule next chunk
let streamSources = [];         // Active AudioBufferSourceNodes
let streamTtsTime = null;
let vadReady = false;
let mediaReady = false;

// ── Frame Sampler (continuous background capture for video understanding) ──
const FRAME_RING_SIZE = 8;       // max frames in ring buffer
const FRAME_SAMPLE_INTERVAL = 1500; // ms between background captures
const FRAME_THUMB_W = 80;       // thumbnail width for diff computation
const FRAME_THUMB_H = 60;       // thumbnail height for diff computation
const FRAME_JPEG_W = 320;       // full frame width sent to model
const FRAME_JPEG_Q = 0.7;       // JPEG quality
const KEYFRAME_MAX = 5;         // max keyframes to send per turn
let frameRing = [];             // ring buffer: { ts, pixels (Uint8Array grayscale), jpeg }
let frameSamplerTimer = null;
let frameSamplerCanvas = null;  // offscreen canvas for thumbnail diff
let frameSamplerCtx = null;
let frameJpegCanvas = null;     // offscreen canvas for full-res JPEG
let frameJpegCtx = null;

// ── Waveform Visualizer ──
let analyser, micSource;
const BAR_COUNT = 40;
const BAR_GAP = 3;
let waveformRAF;
let ambientPhase = 0;

function initWaveformCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveformCanvas.getBoundingClientRect();
  waveformCanvas.width = rect.width * dpr;
  waveformCanvas.height = rect.height * dpr;
  waveformCtx.scale(dpr, dpr);
}

function getStateColor() {
  const colors = { listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
  return colors[state] || colors.loading;
}

function drawWaveform() {
  const w = waveformCanvas.getBoundingClientRect().width;
  const h = waveformCanvas.getBoundingClientRect().height;
  waveformCtx.clearRect(0, 0, w, h);

  const barWidth = (w - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
  const color = getStateColor();
  waveformCtx.fillStyle = color;

  let dataArray = null;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
  }

  for (let i = 0; i < BAR_COUNT; i++) {
    let amplitude;
    if (dataArray) {
      // Map bar index to frequency bin
      const binIndex = Math.floor((i / BAR_COUNT) * dataArray.length * 0.6);
      amplitude = dataArray[binIndex] / 255;
    }

    // If no real audio data or very quiet, use ambient drift
    if (!dataArray || amplitude < 0.02) {
      ambientPhase = (ambientPhase + 0.0001) % (Math.PI * 200);
      const drift = Math.sin(ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
      amplitude = 0.03 + drift * 0.04;
    }

    const barH = Math.max(2, amplitude * (h - 4));
    const x = i * (barWidth + BAR_GAP);
    const y = (h - barH) / 2;

    waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
    waveformCtx.beginPath();
    const r = Math.min(barWidth / 2, barH / 2, 3);
    waveformCtx.roundRect(x, y, barWidth, barH, r);
    waveformCtx.fill();
  }

  waveformCtx.globalAlpha = 1;
  waveformRAF = requestAnimationFrame(drawWaveform);
}

// ── Dynamic glow intensity for speaking state ──
function updateSpeakingGlow() {
  if (state !== 'speaking' || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;
  // Modulate the glow layers based on audio amplitude
  const intensity = 0.3 + avg * 0.7;
  viewportWrap.style.setProperty('--speak-intensity', intensity);
  const spread = 20 + avg * 60;
  const inner = 15 + avg * 25;
  viewportWrap.querySelector('.viewport-glow').style.boxShadow =
    `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
  viewportWrap.style.boxShadow =
    `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
  requestAnimationFrame(updateSpeakingGlow);
}

// ── State Machine ──
function setState(newState) {
  state = newState;

  // Update state indicator
  stateDot.className = `dot ${newState}`;
  const labels = { loading: 'Loading...', listening: 'Listening', processing: 'Thinking...', speaking: 'Speaking' };
  stateText.textContent = labels[newState] || newState;

  // Update viewport glow class
  viewportWrap.className = `viewport-wrap ${newState}`;

  // Reset inline styles from speaking glow
  if (newState !== 'speaking') {
    viewportWrap.style.boxShadow = '';
    viewportWrap.querySelector('.viewport-glow').style.boxShadow = '';
  }

  // Update CSS custom properties for state color (must use resolved values, not nested var())
  const stateVars = {
    listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
    processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
    speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
    loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
  };
  const [glow, glowDim] = stateVars[newState] || stateVars.loading;
  document.documentElement.style.setProperty('--glow', glow);
  document.documentElement.style.setProperty('--glow-dim', glowDim);

  // Kick off speaking glow animation
  if (newState === 'speaking') requestAnimationFrame(updateSpeakingGlow);

  // Raise VAD threshold during speaking to reduce echo false triggers
  if (myvad) {
    myvad.setOptions({ positiveSpeechThreshold: newState === 'speaking' ? 0.92 : 0.5 });
  }

  // Connect/disconnect mic analyser based on state
  if (newState === 'listening' && mediaStream && audioCtx && analyser) {
    if (!micSource) {
      micSource = audioCtx.createMediaStreamSource(mediaStream);
    }
    try { micSource.connect(analyser); } catch {}
  } else if (micSource && newState !== 'listening') {
    try { micSource.disconnect(analyser); } catch {}
  }
}

// ── WebSocket ──
let reconnectDelay = 2000;
let reconnectAttempts = 0;
const MAX_RECONNECT_DELAY = 30000;

function connect() {
  ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected', 'Connected');
    reconnectAttempts = 0;
    reconnectDelay = 2000;
    if (state !== 'loading') setState('listening');
  };
  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    reconnectAttempts++;
    const delay = Math.min(reconnectDelay * Math.pow(2, reconnectAttempts - 1), MAX_RECONNECT_DELAY);
    setStatus('disconnected', `Reconnecting in ${Math.round(delay/1000)}s...`);
    setTimeout(connect, delay);
  };
  ws.onmessage = ({ data }) => {
    let msg;
    try {
      msg = JSON.parse(data);
    } catch (e) {
      console.error('Failed to parse WebSocket message:', e);
      return;
    }
    if (msg.type === 'error') {
      addMessage('system', msg.text);
      setStatus('connected', 'Connected');
      setState('listening');
    } else if (msg.type === 'text') {
      if (msg.transcription) {
        const userMsgs = messagesDiv.querySelectorAll('.msg.user');
        const lastUserMsg = userMsgs[userMsgs.length - 1];
        if (lastUserMsg) {
          const textSpan = lastUserMsg.querySelector('span');
          if (textSpan) textSpan.textContent = msg.transcription;
        }
      }
      addMessage('assistant', msg.text, `LLM ${msg.llm_time}s`);
      if (!speakerEnabled) {
        setStatus('connected', 'Connected');
        setState('listening');
      }
    } else if (msg.type === 'audio_start') {
      if (ignoreIncomingAudio || !speakerEnabled) return;
      streamSampleRate = msg.sample_rate || 24000;
      startStreamPlayback();
    } else if (msg.type === 'audio_chunk') {
      if (ignoreIncomingAudio || !speakerEnabled) return;
      queueAudioChunk(msg.audio);
    } else if (msg.type === 'audio_end') {
      if (ignoreIncomingAudio || !speakerEnabled) {
        ignoreIncomingAudio = false;
        stopPlayback();
        setState('listening');
        return;
      }
      streamTtsTime = msg.tts_time;
      const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
      if (meta) meta.textContent += ` · TTS ${msg.tts_time}s`;
    }
  };
}

function setStatus(cls, text) { statusEl.className = `status-pill ${cls}`; statusEl.textContent = text; }

function setCameraButton(enabled) {
  cameraToggle.classList.toggle('active', enabled);
  cameraToggle.textContent = enabled ? 'Camera On' : 'Camera Off';
  video.style.opacity = enabled ? 1 : 0.3;
}

function setCameraPromptButton() {
  cameraToggle.classList.remove('active');
  cameraToggle.textContent = 'Enable Camera/Mic';
  video.style.opacity = 1;
}

function setSpeakerButton(enabled) {
  speakerToggle.classList.toggle('active', enabled);
  speakerToggle.textContent = enabled ? 'Speaker On' : 'Speaker Off';
}

function setResponseLength(length) {
  responseLength = length;
  lengthShort.classList.toggle('active', length === 'short');
  lengthMedium.classList.toggle('active', length === 'medium');
  lengthLong.classList.toggle('active', length === 'long');
}

let systemPromptDefault = '';

async function loadConfig() {
  try {
    const res = await fetch('/config');
    if (!res.ok) return;
    const cfg = await res.json();
    if (cfg.model_label) modelLabel.textContent = cfg.model_label;
    if (cfg.system_prompt_default) {
      systemPromptDefault = cfg.system_prompt_default;
      systemPromptInput.placeholder = systemPromptDefault;
    }
  } catch (e) {
    console.error('Failed to load config:', e);
    modelLabel.textContent = 'Model (config unavailable)';
  }
}

function waitForVideoReady(el, timeoutMs = 8000) {
  return new Promise((resolve, reject) => {
    if (el.readyState >= 2 && el.videoWidth > 0 && el.videoHeight > 0) {
      resolve();
      return;
    }

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Camera preview timed out'));
    }, timeoutMs);

    const onReady = () => {
      if (el.videoWidth > 0 && el.videoHeight > 0) {
        cleanup();
        resolve();
      }
    };

    const onError = () => {
      cleanup();
      reject(new Error('Camera preview failed to start'));
    };

    function cleanup() {
      clearTimeout(timer);
      el.removeEventListener('loadedmetadata', onReady);
      el.removeEventListener('canplay', onReady);
      el.removeEventListener('playing', onReady);
      el.removeEventListener('error', onError);
    }

    el.addEventListener('loadedmetadata', onReady);
    el.addEventListener('canplay', onReady);
    el.addEventListener('playing', onReady);
    el.addEventListener('error', onError);
  });
}

async function attachVideoStream(stream) {
  video.srcObject = stream;
  video.muted = true;
  video.playsInline = true;
  try {
    await video.play();
  } catch (e) {
    console.warn('video.play() failed:', e.message);
  }
  await waitForVideoReady(video);
}

function describeMediaError(err) {
  if (!err) return 'Unknown camera error';
  const name = err.name || 'Error';
  const message = err.message || '';
  return message ? `${name}: ${message}` : name;
}

// ── Camera ──
async function startCamera() {
  if (!navigator.mediaDevices?.getUserMedia) {
    throw new Error('getUserMedia unavailable in this browser/context');
  }

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    await attachVideoStream(mediaStream);
    return;
  } catch (e) {
    console.warn('Video+audio failed:', describeMediaError(e));
  }

  const streams = await Promise.allSettled([
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } }),
    navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }),
  ]);
  mediaStream = new MediaStream();
  streams.forEach(r => { if (r.status === 'fulfilled') r.value.getTracks().forEach(t => mediaStream.addTrack(t)); });
  if (mediaStream.getVideoTracks().length) {
    await attachVideoStream(mediaStream);
  } else {
    const videoErr = streams[0].status === 'rejected' ? describeMediaError(streams[0].reason) : 'No video track returned';
    const audioErr = streams[1].status === 'rejected' ? describeMediaError(streams[1].reason) : null;
    const contextHint =
      location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'
        ? ' Likely insecure context: use http://127.0.0.1:9091 or http://localhost:9091.'
        : '';
    throw new Error(`Camera unavailable. video=${videoErr}${audioErr ? `; audio=${audioErr}` : ''}.${contextHint}`);
  }
  if (!mediaStream.getAudioTracks().length) {
    addMessage('system', 'Microphone unavailable. Camera preview is active, but voice input is disabled.');
  }
}

async function initVad() {
  if (!mediaStream || !mediaStream.getAudioTracks().length) return;
  if (!window.vad || !window.vad.MicVAD) {
    addMessage('system', 'VAD script failed to load. Camera preview is active, but voice input is unavailable.');
    return;
  }

  myvad = await vad.MicVAD.new({
    getStream: async () => new MediaStream(mediaStream.getAudioTracks()),
    positiveSpeechThreshold: 0.5,
    negativeSpeechThreshold: 0.25,
    redemptionMs: 600,
    minSpeechMs: 300,
    preSpeechPadMs: 300,
    onSpeechStart: handleSpeechStart,
    onSpeechEnd: handleSpeechEnd,
    onVADMisfire: () => { console.log('VAD misfire (too short)'); },
    onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
    baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
  });

  myvad.start();
  vadReady = true;
  console.log('VAD initialized and listening');
}

async function requestMediaAccess() {
  setState('loading');
  stateText.textContent = 'Requesting Camera...';
  try {
    await startCamera();
    mediaReady = true;
    cameraEnabled = true;
    setCameraButton(true);
    startFrameSampler();
    if (!vadReady) {
      await initVad();
    }
    setState('listening');
  } catch (e) {
    mediaReady = false;
    cameraEnabled = false;
    setCameraPromptButton();
    addMessage('system', `Camera failed: ${e.message}`);
    stateText.textContent = 'Grant Camera Access';
    throw e;
  }
}

function captureFrame() {
  if (!cameraEnabled || !mediaReady || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ── Frame Sampler: continuous background capture + keyframe selection ──

function initFrameSampler() {
  frameSamplerCanvas = document.createElement('canvas');
  frameSamplerCanvas.width = FRAME_THUMB_W;
  frameSamplerCanvas.height = FRAME_THUMB_H;
  frameSamplerCtx = frameSamplerCanvas.getContext('2d', { willReadFrequently: true });
  frameJpegCanvas = document.createElement('canvas');
  frameJpegCanvas.width = FRAME_JPEG_W;
  frameJpegCtx = frameJpegCanvas.getContext('2d');
  frameRing = [];
}

function captureThumbPixels() {
  // Draw current video frame as grayscale thumbnail, return Uint8Array of pixel values
  frameSamplerCtx.drawImage(video, 0, 0, FRAME_THUMB_W, FRAME_THUMB_H);
  const rgba = frameSamplerCtx.getImageData(0, 0, FRAME_THUMB_W, FRAME_THUMB_H).data;
  const gray = new Uint8Array(FRAME_THUMB_W * FRAME_THUMB_H);
  for (let i = 0; i < gray.length; i++) {
    const r = rgba[i * 4], g = rgba[i * 4 + 1], b = rgba[i * 4 + 2];
    gray[i] = (r * 77 + g * 150 + b * 29) >> 8; // fast grayscale
  }
  return gray;
}

function computeFrameDiff(prev, curr) {
  if (!prev || !curr || prev.length !== curr.length) return 1.0;
  let sum = 0;
  for (let i = 0; i < prev.length; i++) sum += Math.abs(prev[i] - curr[i]);
  return sum / (prev.length * 255); // normalized 0..1
}

function captureJpegBase64() {
  const scale = FRAME_JPEG_W / video.videoWidth;
  frameJpegCanvas.height = video.videoHeight * scale;
  frameJpegCtx.drawImage(video, 0, 0, FRAME_JPEG_W, frameJpegCanvas.height);
  return frameJpegCanvas.toDataURL('image/jpeg', FRAME_JPEG_Q).split(',')[1];
}

function sampleFrame() {
  if (!cameraEnabled || !mediaReady || !video.videoWidth) return;
  const now = Date.now();
  const pixels = captureThumbPixels();
  const prevPixels = frameRing.length > 0 ? frameRing[frameRing.length - 1].pixels : null;
  const diff = computeFrameDiff(prevPixels, pixels);
  // Skip expensive JPEG encoding during non-listening states (model is busy).
  // JPEG will be captured on-demand in selectKeyframes() when needed.
  const jpeg = state === 'listening' ? captureJpegBase64() : null;
  const frame = { ts: now, pixels, diff, jpeg };

  // Append to ring buffer, evict oldest if full
  if (frameRing.length >= FRAME_RING_SIZE) frameRing.shift();
  frameRing.push(frame);

  // Update frame badge
  const badge = $('frameBadge');
  if (badge) {
    badge.style.display = '';
    badge.textContent = `${frameRing.length} frames`;
  }
}

function startFrameSampler() {
  if (frameSamplerTimer) return;
  initFrameSampler();
  // Capture first frame immediately
  sampleFrame();
  frameSamplerTimer = setInterval(sampleFrame, FRAME_SAMPLE_INTERVAL);
  console.log(`Frame sampler started (${FRAME_SAMPLE_INTERVAL}ms interval, ring=${FRAME_RING_SIZE})`);
}

function stopFrameSampler() {
  if (frameSamplerTimer) {
    clearInterval(frameSamplerTimer);
    frameSamplerTimer = null;
  }
  frameRing = [];
  const badge = $('frameBadge');
  if (badge) badge.style.display = 'none';
}

function selectKeyframes() {
  // Select up to KEYFRAME_MAX frames from ring buffer using diff-based selection.
  // Always include the latest frame. Fill remaining slots with highest-diff frames.
  if (frameRing.length === 0) return [];
  if (frameRing.length === 1) return [frameRing[0].jpeg || captureJpegBase64()];

  // Capture a fresh frame right now (most current view)
  const freshPixels = captureThumbPixels();
  const freshDiff = computeFrameDiff(frameRing[frameRing.length - 1].pixels, freshPixels);
  const freshJpeg = captureJpegBase64();
  const freshFrame = { ts: Date.now(), pixels: freshPixels, diff: freshDiff, jpeg: freshJpeg };

  // Build candidate pool (all ring frames except we'll replace "latest" with fresh)
  const candidates = frameRing.slice(); // shallow copy

  // Always include the fresh (latest) frame
  const selected = [freshFrame];
  const selectedTs = new Set([freshFrame.ts]);

  // Sort remaining candidates by diff (descending) to pick most informative frames
  const sorted = candidates
    .filter(f => !selectedTs.has(f.ts) && f.diff > 0.01) // skip near-duplicates
    .sort((a, b) => b.diff - a.diff);

  for (const f of sorted) {
    if (selected.length >= KEYFRAME_MAX) break;
    // Avoid frames too close in time to already-selected ones (min 1s gap)
    const tooClose = selected.some(s => Math.abs(s.ts - f.ts) < 1000);
    if (!tooClose) {
      selected.push(f);
      selectedTs.add(f.ts);
    }
  }

  // If still under budget, fill with evenly-spaced frames from ring
  if (selected.length < KEYFRAME_MAX && candidates.length > 0) {
    const step = Math.max(1, Math.floor(candidates.length / (KEYFRAME_MAX - selected.length + 1)));
    for (let i = 0; i < candidates.length && selected.length < KEYFRAME_MAX; i += step) {
      if (!selectedTs.has(candidates[i].ts)) {
        selected.push(candidates[i]);
        selectedTs.add(candidates[i].ts);
      }
    }
  }

  // Sort by timestamp (chronological) and return jpeg strings
  selected.sort((a, b) => a.ts - b.ts);
  // Lazily capture JPEG for any frames that were stored without one (captured during non-listening)
  return selected.map(f => f.jpeg || captureJpegBase64());
}

// ── VAD Handlers ──
let speakingStartedAt = 0;
const BARGE_IN_GRACE_MS = 800; // Ignore VAD triggers shortly after TTS starts (echo)

function handleSpeechStart() {
  if (state === 'speaking') {
    // Ignore echo: don't allow barge-in right after TTS starts playing
    if (Date.now() - speakingStartedAt < BARGE_IN_GRACE_MS) {
      console.log('Barge-in suppressed (echo grace period)');
      return;
    }
    stopPlayback();
    ignoreIncomingAudio = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);
  const keyframes = cameraEnabled ? selectKeyframes() : [];

  setState('processing');
  setStatus('processing', 'Processing');
  const camLabel = keyframes.length > 1 ? `with ${keyframes.length} camera frames` : (keyframes.length === 1 ? 'with camera' : '');
  // Build loading dots as DOM elements (avoids innerHTML for user-visible content)
  const dotsSpan = document.createElement('span');
  dotsSpan.className = 'loading-dots';
  for (let i = 0; i < 3; i++) dotsSpan.appendChild(document.createElement('span'));
  addMessage('user', dotsSpan, camLabel);

  const payload = { audio: wavBase64, tts: speakerEnabled, response_length: responseLength };
  if (keyframes.length > 1) {
    payload.images = keyframes;
  } else if (keyframes.length === 1) {
    payload.image = keyframes[0];
  }
  const sp = getSystemPrompt();
  if (sp) payload.system_prompt = sp;
  ws.send(JSON.stringify(payload));
}

function sendTextMessage() {
  const text = textInput.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addMessage('system', 'WebSocket not connected yet.');
    return;
  }

  const keyframes = cameraEnabled ? selectKeyframes() : [];
  const camLabel = keyframes.length > 1 ? `typed · ${keyframes.length} camera frames` : (keyframes.length === 1 ? 'typed · with camera' : 'typed');
  addMessage('user', text, camLabel);

  setState('processing');
  setStatus('processing', 'Processing');

  const payload = { text, tts: speakerEnabled, response_length: responseLength };
  if (keyframes.length > 1) {
    payload.images = keyframes;
  } else if (keyframes.length === 1) {
    payload.image = keyframes[0];
  }
  const sp = getSystemPrompt();
  if (sp) payload.system_prompt = sp;
  ws.send(JSON.stringify(payload));
  textInput.value = '';
}

// ── Float32 @ 16kHz → WAV base64 ──
function float32ToWavBase64(samples, sampleRate) {
  const numChannels = 1;
  const bitsPerSample = 16;
  const byteRate = (sampleRate || 16000) * numChannels * bitsPerSample / 8;
  const blockAlign = numChannels * bitsPerSample / 8;
  const dataSize = samples.length * blockAlign;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  // Write WAV header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate || 16000, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  // Write samples
  let offset = 44;
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }

  // Convert to base64 using chunked String.fromCharCode
  const bytes = new Uint8Array(buffer);
  let binary = '';
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}

// ── Streaming Playback ──
function stopPlayback() {
  // Use a copy to avoid mutation during iteration (onended callbacks splice from same array)
  const sources = [...streamSources];
  streamSources = [];
  for (const src of sources) {
    try { src.stop(); } catch {}
  }
  currentSource = null;
  streamNextTime = 0;
}

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
  }
}

function startStreamPlayback() {
  stopPlayback();
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  streamNextTime = audioCtx.currentTime + 0.05; // Small initial buffer
  speakingStartedAt = Date.now();
  setState('speaking');
}

function queueAudioChunk(base64Pcm) {
  ensureAudioCtx();

  // Decode base64 -> Int16 PCM -> Float32
  const bin = atob(base64Pcm);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  // Create AudioBuffer and schedule it
  const audioBuffer = audioCtx.createBuffer(1, float32.length, streamSampleRate);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.connect(analyser);

  // Schedule gapless playback
  const startAt = Math.max(streamNextTime, audioCtx.currentTime);
  source.start(startAt);
  streamNextTime = startAt + audioBuffer.duration;

  streamSources.push(source);
  currentSource = source;

  // Clean up when this chunk finishes
  source.onended = () => {
    const idx = streamSources.indexOf(source);
    if (idx !== -1) streamSources.splice(idx, 1);
    // If this was the last chunk and no more are queued, return to listening
    if (streamSources.length === 0 && state === 'speaking') {
      currentSource = null;
      setState('listening');
      setStatus('connected', 'Connected');
    }
  };
}

// ── UI ──
function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  // Sanitize: use textContent for message body to prevent XSS from LLM responses.
  // Only use innerHTML for controlled meta/timestamp content.
  if (text instanceof Node) {
    div.appendChild(text);
  } else {
    const textEl = document.createElement('span');
    textEl.textContent = text;
    div.appendChild(textEl);
  }
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    metaDiv.innerHTML = meta;
    div.appendChild(metaDiv);
  }
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

cameraToggle.addEventListener('click', async () => {
  if (!mediaReady) {
    try {
      await requestMediaAccess();
    } catch (e) {
      console.error('Media access failed:', e);
    }
    return;
  }

  cameraEnabled = !cameraEnabled;
  setCameraButton(cameraEnabled);
  if (cameraEnabled) {
    startFrameSampler();
  } else {
    stopFrameSampler();
  }
});

speakerToggle.addEventListener('click', () => {
  speakerEnabled = !speakerEnabled;
  setSpeakerButton(speakerEnabled);
  if (!speakerEnabled) {
    stopPlayback();
    if (state === 'speaking') {
      setState('listening');
      setStatus('connected', 'Connected');
    }
  }
});

lengthShort.addEventListener('click', () => setResponseLength('short'));
lengthMedium.addEventListener('click', () => setResponseLength('medium'));
lengthLong.addEventListener('click', () => setResponseLength('long'));

textToggle.addEventListener('click', () => {
  composerVisible = !composerVisible;
  composer.classList.toggle('visible', composerVisible);
  textToggle.classList.toggle('active', composerVisible);
  if (composerVisible) textInput.focus();
});

// ── Settings panel ──
const settingsPanel = document.getElementById('settingsPanel');
const systemPromptInput = document.getElementById('systemPromptInput');
const settingsToggleBtn = document.getElementById('settingsToggle');
const settingsSaveBtn = document.getElementById('settingsSave');
const settingsResetBtn = document.getElementById('settingsReset');

let settingsVisible = false;

function getSystemPrompt() {
  return localStorage.getItem('systemPrompt') || '';
}

settingsToggleBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsVisible = !settingsVisible;
  settingsPanel.classList.toggle('visible', settingsVisible);
  settingsToggleBtn.classList.toggle('active', settingsVisible);
  if (settingsVisible) {
    systemPromptInput.value = getSystemPrompt();
    systemPromptInput.focus();
  }
});

settingsSaveBtn.addEventListener('click', () => {
  const val = systemPromptInput.value.trim();
  if (val) {
    localStorage.setItem('systemPrompt', val);
  } else {
    localStorage.removeItem('systemPrompt');
  }
  settingsVisible = false;
  settingsPanel.classList.remove('visible');
  settingsToggleBtn.classList.remove('active');
});

settingsResetBtn.addEventListener('click', () => {
  localStorage.removeItem('systemPrompt');
  systemPromptInput.value = '';
  settingsVisible = false;
  settingsPanel.classList.remove('visible');
  settingsToggleBtn.classList.remove('active');
});

document.addEventListener('click', (e) => {
  if (settingsVisible && !settingsPanel.contains(e.target) && e.target !== settingsToggleBtn) {
    settingsVisible = false;
    settingsPanel.classList.remove('visible');
    settingsToggleBtn.classList.remove('active');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && settingsVisible) {
    settingsVisible = false;
    settingsPanel.classList.remove('visible');
    settingsToggleBtn.classList.remove('active');
  }
});

sendButton.addEventListener('click', sendTextMessage);
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendTextMessage();
  }
});

// ── Init ──
async function init() {
  initWaveformCanvas();
  window.addEventListener('resize', initWaveformCanvas);

  await loadConfig();
  connect();
  setState('loading');
  stateText.textContent = 'Click Enable Camera/Mic';
  setCameraPromptButton();
  setSpeakerButton(true);
  setResponseLength('medium');

  // Init audio context on first user gesture for mic visualizer
  // (browsers require user interaction to create AudioContext)
  const initAudio = () => {
    ensureAudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.removeEventListener('click', initAudio);
    document.removeEventListener('keydown', initAudio);
  };
  document.addEventListener('click', initAudio);
  document.addEventListener('keydown', initAudio);
  // Also try immediately (may work if page had prior interaction)
  ensureAudioCtx();

  // Start waveform loop
  drawWaveform();
}

init();
</script>
